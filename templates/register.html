<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký — Test Stabilization Tracker</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08); padding: 28px 30px; width: 380px; max-width: 92vw;
  }
  .auth-card h1 { font-size: 20px; color: var(--primary); margin: 0 0 4px; }
  .auth-card .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .auth-note {
    background: #eef4fb; border: 1px solid #d6e4f5; color: #2c5a86; font-size: 12.5px;
    border-radius: 8px; padding: 9px 11px; margin-bottom: 16px; line-height: 1.5;
  }
  .auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
  .auth-field input { padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; }
  .auth-btn {
    width: 100%; padding: 10px; border: none; border-radius: 7px; background: var(--primary);
    color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;
  }
  .auth-btn:hover { background: var(--primary-light); }
  .auth-alt { text-align: center; font-size: 13px; margin-top: 16px; color: var(--muted); }
  .auth-alt a { color: var(--primary-light); font-weight: 600; text-decoration: none; }
  .auth-msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .auth-msg.err { color: #c0392b; }
  .auth-msg.ok { color: #1e8449; }
</style>
</head>
<body>
<form class="auth-card" id="registerForm" autocomplete="off">
  <h1>🧪 Đăng ký tài khoản</h1>
  <p class="sub">Test Stabilization Tracker</p>
  <div class="auth-note">⚠️ Tên tài khoản <b>phải trùng</b> với tên bạn trong <b>Danh sách Owner</b> của hệ thống thì mới đăng ký được. Mật khẩu chấp nhận mọi ký tự.</div>
  <label class="auth-field">Tên tài khoản (Owner)
    <input type="text" id="username" placeholder="VD: anh.hh" autofocus>
  </label>
  <label class="auth-field">Mật khẩu
    <input type="password" id="password" placeholder="Nhập mật khẩu">
  </label>
  <button type="submit" class="auth-btn">Đăng ký</button>
  <div class="auth-msg" id="msg"></div>
  <p class="auth-alt">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
</form>
<script>
const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.textContent = ""; msg.className = "auth-msg";
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  try {
    const res = await fetch("/api/auth/register", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || ("HTTP " + res.status));
    msg.textContent = "✅ Đăng ký thành công! Đang chuyển tới trang đăng nhập...";
    msg.className = "auth-msg ok";
    setTimeout(() => { window.location = "/login"; }, 1200);
  } catch (err) {
    msg.textContent = err.message; msg.className = "auth-msg err";
  }
});
</script>
</body>
</html>
